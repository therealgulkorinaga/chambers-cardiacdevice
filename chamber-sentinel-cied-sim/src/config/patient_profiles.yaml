# =============================================================================
# Chamber Sentinel CIED Simulator — Patient Archetypes
# =============================================================================
# Ten representative patient profiles spanning the most common CIED
# indications, demographics, and comorbidity burdens.  Each profile
# parameterises the stochastic generators so that a cohort of virtual
# patients drawn from the same archetype will exhibit clinically plausible
# variation around the archetype's central tendencies.
# =============================================================================

patients:

  # ---------------------------------------------------------------------------
  # P-001  Sick Sinus Syndrome — low-complexity, stable pacing
  # ---------------------------------------------------------------------------
  - patient_id: P-001
    label: "Sick Sinus Syndrome — Stable Bradycardia"
    primary_diagnosis: sick_sinus_syndrome
    device_type: DDD
    demographics:
      age: 72
      sex: female
      bmi: 27.5
    comorbidities:
      - hypertension
    heart_failure_nyha: null
    af_burden_fraction: 0.02        # 2 % of time in AF
    vt_risk_annual: 0.005           # very low
    pacing_dependency: 0.40         # moderate sinus pauses

    rhythm_transition_overrides:
      # probability per hour of leaving normal sinus rhythm
      nsr_to_af_per_hour: 0.001
      af_to_nsr_per_hour: 0.10
      nsr_to_vt_per_hour: 0.0001
      vt_to_nsr_per_hour: 0.90

    activity_params:
      resting_hr_bpm: 55
      max_hr_bpm: 130
      daily_active_minutes_min: 30
      daily_active_minutes_max: 90
      circadian_amplitude: 0.15     # fractional HR swing dawn-to-dusk

    medication_effects:
      beta_blocker:
        hr_reduction_fraction: 0.12
        av_conduction_delay_ms: 10
      ace_inhibitor:
        hr_reduction_fraction: 0.0
        av_conduction_delay_ms: 0

  # ---------------------------------------------------------------------------
  # P-002  Complete Heart Block — no comorbidities
  # ---------------------------------------------------------------------------
  - patient_id: P-002
    label: "Complete Heart Block — Otherwise Healthy"
    primary_diagnosis: complete_heart_block
    device_type: DDD
    demographics:
      age: 65
      sex: male
      bmi: 25.0
    comorbidities: []
    heart_failure_nyha: null
    af_burden_fraction: 0.0
    vt_risk_annual: 0.003
    pacing_dependency: 0.95         # near-complete pacing dependence

    rhythm_transition_overrides:
      nsr_to_af_per_hour: 0.0005
      af_to_nsr_per_hour: 0.20
      nsr_to_vt_per_hour: 0.00005
      vt_to_nsr_per_hour: 0.95

    activity_params:
      resting_hr_bpm: 38            # underlying junctional escape
      max_hr_bpm: 150
      daily_active_minutes_min: 60
      daily_active_minutes_max: 150
      circadian_amplitude: 0.20

    medication_effects: {}

  # ---------------------------------------------------------------------------
