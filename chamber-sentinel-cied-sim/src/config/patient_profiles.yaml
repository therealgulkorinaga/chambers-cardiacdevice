      daily_active_minutes_max: 60
      circadian_amplitude: 0.10

    medication_effects:
      beta_blocker:
        hr_reduction_fraction: 0.15
        av_conduction_delay_ms: 15
      digoxin:
        hr_reduction_fraction: 0.08
        av_conduction_delay_ms: 20
      metformin:
        hr_reduction_fraction: 0.0
        av_conduction_delay_ms: 0

  # ---------------------------------------------------------------------------
  # P-004  Ischemic CMP + VT — CRT-D, HF NYHA III + CKD
  # ---------------------------------------------------------------------------
  - patient_id: P-004
    label: "Ischemic Cardiomyopathy with VT — Advanced HF + CKD"
    primary_diagnosis: ischemic_cardiomyopathy_with_vt
    device_type: CRT_D
    demographics:
      age: 58
      sex: male
      bmi: 29.0
    comorbidities:
      - heart_failure
      - chronic_kidney_disease
