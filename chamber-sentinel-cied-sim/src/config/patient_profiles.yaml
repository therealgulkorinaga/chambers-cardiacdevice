      af_to_nsr_per_hour: 0.06
      nsr_to_vt_per_hour: 0.003
      vt_to_nsr_per_hour: 0.60      # some self-terminating VT
      vt_to_vf_per_hour: 0.05       # can degenerate

    activity_params:
